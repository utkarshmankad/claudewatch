<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClaudeWatch Settings</title>
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <div id="app">

    <!-- ── Page header ── -->
    <header>
      <div class="header-inner">
        <div class="header-left">
          <svg class="logo-mark" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect width="22" height="22" rx="5" fill="#e8620a"/>
            <text x="11" y="16" font-family="monospace" font-size="12" font-weight="700"
                  fill="#fff" text-anchor="middle">CW</text>
          </svg>
          <div>
            <h1>ClaudeWatch</h1>
            <p class="header-sub">Extension Settings</p>
          </div>
        </div>
        <span class="version" id="version"></span>
      </div>
    </header>

    <!-- ── Main form ── -->
    <main>
      <form id="settings-form" novalidate>

        <!-- NOTIFICATIONS -->
        <section class="card">
          <h2 class="card-title">Notifications</h2>

          <label class="toggle-row" for="alerts-enabled">
            <span class="toggle-text">
              <span class="toggle-label">Enable usage alerts</span>
              <span class="toggle-hint">Show desktop notifications when thresholds are crossed</span>
            </span>
            <span class="switch">
              <input type="checkbox" id="alerts-enabled" name="alertsEnabled" />
              <span class="switch-track"></span>
            </span>
          </label>
        </section>

        <!-- ALERT THRESHOLDS -->
        <section class="card" id="thresholds-card">
          <h2 class="card-title">Alert Thresholds</h2>
          <p class="card-hint">Each threshold fires once per session window, then re-arms when the window resets.</p>

          <div class="threshold-list">
            <label class="checkbox-row" for="t-80">
              <input type="checkbox" id="t-80" name="threshold" value="80" />
              <span class="checkbox-custom"></span>
              <span class="checkbox-body">
                <span class="threshold-pct green">80%</span>
                <span class="threshold-desc">Approaching limit — good time to wrap up</span>
              </span>
            </label>

            <label class="checkbox-row" for="t-90">
              <input type="checkbox" id="t-90" name="threshold" value="90" />
              <span class="checkbox-custom"></span>
              <span class="checkbox-body">
                <span class="threshold-pct amber">90%</span>
                <span class="threshold-desc">High usage — save your work</span>
              </span>
            </label>

            <label class="checkbox-row" for="t-95">
              <input type="checkbox" id="t-95" name="threshold" value="95" />
              <span class="checkbox-custom"></span>
              <span class="checkbox-body">
                <span class="threshold-pct red">95%</span>
                <span class="threshold-desc">Critical — session almost exhausted</span>
              </span>
            </label>
          </div>
        </section>

        <!-- CLAUDEWATCH CORE -->
        <section class="card">
          <h2 class="card-title">ClaudeWatch Core</h2>
          <p class="card-hint">URL where the ClaudeWatch background daemon is running.</p>

          <div class="field-group">
            <label class="field-label" for="core-url">Core URL</label>
            <div class="field-row">
              <input type="url" id="core-url" name="coreUrl"
                     placeholder="http://localhost:7734"
                     spellcheck="false" autocomplete="off" />
              <button type="button" class="btn-test" id="btn-test-conn">Test</button>
            </div>
            <p class="field-hint" id="conn-result"></p>
          </div>
        </section>

        <!-- ABOUT -->
        <section class="card card-about">
          <h2 class="card-title">About</h2>
          <dl class="about-grid">
            <dt>Version</dt>          <dd id="about-version">—</dd>
            <dt>Last sync</dt>        <dd id="about-last-sync">—</dd>
            <dt>Extension ID</dt>     <dd id="about-ext-id" class="mono truncate">—</dd>
          </dl>
        </section>

        <!-- Actions -->
        <div class="actions">
          <button type="submit" class="btn btn-primary" id="btn-save">Save Settings</button>
          <button type="button" class="btn btn-ghost"   id="btn-reset">Reset to defaults</button>
          <span class="save-confirm" id="save-confirm" aria-live="polite"></span>
        </div>

      </form>
    </main>

  </div>
  <script src="settings.js"></script>
</body>
</html>
